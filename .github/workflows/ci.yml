name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Typecheck shared package
        run: npm run typecheck --workspace=packages/shared

      - name: Typecheck API
        run: npm run typecheck --workspace=apps/api

      - name: Lint API
        run: npm run lint --workspace=apps/api

  api-test:
    name: API Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: lifeflow
          POSTGRES_PASSWORD: lifeflow
          POSTGRES_DB: lifeflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Generate Prisma Client
        run: npm run db:generate --workspace=apps/api

      - name: Run API tests
        run: npm run test --workspace=apps/api --if-present
        env:
          DATABASE_URL: postgresql://lifeflow:lifeflow@localhost:5432/lifeflow_test
          AUTH0_DOMAIN: test.auth0.com
          AUTH0_AUDIENCE: https://api.lifeflow.app

  mobile-build:
    name: Mobile Build Check
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Lint mobile
        run: npm run lint --workspace=apps/mobile --if-present

      - name: Typecheck mobile
        run: npx tsc --noEmit --project apps/mobile/tsconfig.json
