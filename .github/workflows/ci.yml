name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ─── Lint & Type Check ────────────────────────────────────────────────────────
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Typecheck shared package
        run: npm run typecheck --workspace=packages/shared

      - name: Typecheck API
        run: npm run typecheck --workspace=apps/api

      - name: Lint API
        run: npm run lint --workspace=apps/api

      - name: Typecheck mobile
        run: npx tsc --noEmit --project apps/mobile/tsconfig.json

      - name: Lint mobile
        run: npm run lint --workspace=apps/mobile --if-present

  # ─── API Tests ────────────────────────────────────────────────────────────────
  api-test:
    name: API Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: lifeflow
          POSTGRES_PASSWORD: lifeflow
          POSTGRES_DB: lifeflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Generate Prisma Client
        run: npm run db:generate --workspace=apps/api

      - name: Run API tests
        run: npm run test --workspace=apps/api --if-present
        env:
          DATABASE_URL: postgresql://lifeflow:lifeflow@localhost:5432/lifeflow_test
          AUTH0_DOMAIN: test.auth0.com
          AUTH0_AUDIENCE: https://api.lifeflow.app
          NODE_ENV: test

  # ─── Android Release APK ─────────────────────────────────────────────────────
  android-release:
    name: Android Release Build
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    # Only build a release APK on pushes to main (not on PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: gradle

      - name: Bundle JS (Metro)
        working-directory: apps/mobile
        run: |
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res

      - name: Build release APK
        working-directory: apps/mobile/android
        run: ./gradlew assembleRelease --no-daemon
        env:
          # Keystore secrets — add these in GitHub → Settings → Secrets
          LIFEFLOW_KEYSTORE_PASSWORD: ${{ secrets.LIFEFLOW_KEYSTORE_PASSWORD }}
          LIFEFLOW_KEY_ALIAS: ${{ secrets.LIFEFLOW_KEY_ALIAS }}
          LIFEFLOW_KEY_PASSWORD: ${{ secrets.LIFEFLOW_KEY_PASSWORD }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: LifeFlow-release-${{ github.sha }}
          path: apps/mobile/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 14

