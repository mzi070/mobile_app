services:
  postgres:
    image: postgres:16-alpine
    container_name: lifeflow-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: lifeflow
      POSTGRES_PASSWORD: lifeflow
      POSTGRES_DB: lifeflow
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U lifeflow']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
